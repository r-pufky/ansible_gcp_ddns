---
###############################################################################
# Default GCP Dynamic DNS Options
###############################################################################
# Default required packages for GCP Dynamic DNS install.
#
# Updates:
# * KEEP a separate change log as changes are made.
# * Use bare-metal docs to validate package/process changes.
# * Update defaults.
# * Update tests for any changes.
# * Standard validation testing (yamllint, ansible-lint, to-do, no-qa).
#
# Reference:
# * https://github.com/luontola/gcp-dynamic-dns

gcp_ddns___release: "{{ {} | r_pufky.data.v3(

    _date='2026-03-26',
    _debian='trixie',
    _app='v1.5',
  ) }}"

###############################################################################
# APT Packages
###############################################################################

gcp_ddns___packages:
  - 'git'
  - 'ca-certificates'
  - 'golang'

###############################################################################
# GitHub Options
###############################################################################
# GCP Dynamic DNS releases source. Not available on pkg.go.dev. Sync repository
# and manually build. Validate with GPG signing key via git clone.
#
# Reference:
# * https://github.com/luontola/gcp-dynamic-dns/releases

gcp_ddns___app: "{{ {} | r_pufky.data.v3(

    _version=gcp_ddns___release._app,
    _bin='/usr/local/bin/gcp_ddns',
    _opt_d='/opt/gcp_ddns',
    _src_d='/opt/gcp_ddns/src',
    _var_d='/var/opt/gcp_ddns',
    _dns_key='/var/opt/gcp_ddns/dns.key',
    _repo_url='https://github.com/luontola/gcp-dynamic-dns',
    _gpg_keys=['56DE80547DD40CB6'],
    _service='/etc/systemd/system/gcp_ddns.service',
  ) }}"

###############################################################################
# Default Mox User/Group
###############################################################################

gcp_ddns___group:
  name: 'gcp_ddns'
  gid: 555

gcp_ddns___user:
  name: 'gcp_ddns'
  group: 'gcp_ddns'
  uid: 555
  shell: '/usr/sbin/nologin'
  home: '/opt/gcp_ddns'
  comment: 'GCP Dynamic DNS,,,'
  create_home: true
  password: '!'
  password_lock: true
  update_password: 'always'
  expires: -1
  system: true
