---
###############################################################################
# Start
###############################################################################
# Start services and confirm they are active and running.

- name: 'Start | systemd | gcp_ddns.service'
  ansible.builtin.systemd:
    name: 'gcp_ddns.service'
    state: 'started'
    enabled: true
    daemon_reload: true
  delay: 15
  retries: 3
  register: gcp_ddns__service
  until: gcp_ddns__service.status.ActiveState == 'active'

- name: 'Start | fact | query services'
  ansible.builtin.service_facts:

- name: 'Start | assert | services running'
  ansible.builtin.assert:
    quiet: true
    that: ansible_facts.services[item].state == 'running'
    fail_msg: |

      ✘ Service failed to start.
      {{ item }}
  loop:
    - 'gcp_ddns.service'
